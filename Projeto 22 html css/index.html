<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <img src="img/logo.png" class="logo">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Especificações</a></li>
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Conectar</a></li>
            </ul>
        </div>
        <div class="content">
            <div class="left-col">
                <h1>o <br> Real <br> Som</h1>
            </div>
            <div class="right-col">
                <p>Clique aqui para ouvir</p>
                <img src="img/play.png" id="icon">
            </div>
        </div>
    </div>
    <audio id="mySong">
        <source src="JULLIANY SOUZA - QUEM É ESSE_ (AO VIVO).mp3" type="audio/mp3">
    </audio>
    <script>
        var mySong = document.getElementById("mySong");
        var icon = document.getElementById("icon");

        icon.onclick = function(){
            if(mySong.paused){
                mySong.play();
                icon.src = "img/pause.png";
            }else{
                mySong.pause();
                icon.src = "img/play.png";
            }
        }
    </script>
</body>
</html>
